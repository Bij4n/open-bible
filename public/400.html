<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <title>Bad request · Open Bible</title>
    <style>
      :root { --paper:#f7f8f5; --paper-deep:#ecefe7; --ink:#161e1a; --ink-soft:#4a5450; --ink-faint:#677470; --accent:#0F5C3F; --rule:#dde2d8; }
      @media (prefers-color-scheme: dark) { :root { --paper:#0e1411; --paper-deep:#161e1a; --ink:#f7f8f5; --ink-soft:#d1d7ce; --ink-faint:#8a9590; --accent:#5DD4A0; --rule:#243029; } }
      *,*::before,*::after { box-sizing:border-box; margin:0; }
      html { font-size:16px; }
      body { background:var(--paper); color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif; min-height:100dvh; display:grid; place-items:center; padding:2rem 1.5rem; -webkit-font-smoothing:antialiased; }
      main { max-width:36rem; text-align:center; }
      .wordmark { display:inline-flex; align-items:center; gap:.625rem; margin-bottom:2.5rem; font-weight:600; font-size:1.0625rem; letter-spacing:-.01em; text-decoration:none; color:var(--ink); }
      .wordmark::before { content:""; display:inline-block; width:14px; height:14px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 25%,transparent),0 0 0 9px color-mix(in srgb,var(--accent) 10%,transparent); flex-shrink:0; }
      .eyebrow { font-family:ui-monospace,"JetBrains Mono",SFMono-Regular,Menlo,Consolas,monospace; font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-faint); margin-bottom:1.5rem; }
      h1 { font-size:clamp(2.25rem,7vw,3.75rem); font-weight:600; line-height:1.05; letter-spacing:-.035em; margin-bottom:1.25rem; text-wrap:balance; }
      h1 em { font-family:"Instrument Serif",ui-serif,Georgia,serif; font-style:italic; font-weight:400; color:var(--accent); letter-spacing:-.02em; }
      p.body { font-family:"Instrument Serif",ui-serif,Georgia,serif; font-size:1.125rem; line-height:1.6; color:var(--ink-soft); max-width:28rem; margin:0 auto 2rem; text-wrap:pretty; }
      .cta-row { display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:.75rem 1.5rem; }
      .btn-primary, .btn-secondary { display:inline-flex; align-items:center; gap:.5rem; font-weight:500; font-size:1rem; text-decoration:none; transition:background .15s,color .15s,transform .15s; }
      .btn-primary { background:var(--ink); color:var(--paper); padding:.875rem 1.75rem; border-radius:9999px; }
      .btn-primary:hover { background:var(--accent); transform:translateY(-1px); }
      .btn-secondary { color:var(--ink); }
      .btn-secondary:hover { color:var(--accent); }
    </style>
  </head>
  <body>
    <main>
      <a href="/" class="wordmark">Open Bible</a>
      <p class="eyebrow">400 — Bad request</p>
      <h1>That request <em>wasn't quite right.</em></h1>
      <p class="body">Something about that request didn't make sense. Try again, or head back to home.</p>
      <div class="cta-row">
        <a href="/" class="btn-primary">Back to home</a>
        <a href="/public/bible/kjv/gen/1" class="btn-secondary">Open the Bible &rarr;</a>
      </div>
    </main>
  </body>
</html>
