    hero_empty_state:
      ref: Juan 3 · 16
      verse: "Porque de tal manera amó Dios al mundo, que ha dado á su Hijo unigénito, para que todo aquel que en él cree, no se pierda, mas tenga vida eterna."
      cta: "Sé el primero en compartir una nota sobre este versículo →"
    welcome_html: '<span class="block">Donde los versículos</span> <span class="block">encuentran voz.</span>'
    subhead: Resalta las palabras que te atravesaron. Comparte lo que significaron para ti. Lee lo que el mismo versículo significó para otro.
    cta_public_bible: Leer la Biblia
    cta_how_it_works: Ver cómo funciona
    how_it_works_title: Cómo funciona
    tertiary: Sin rastreo. Sostenido por donaciones.
    community:
      heading_html: Lee lo que tocó a <em>otro.</em>
      intro: Un pequeño vistazo de lo que los lectores comparten públicamente. Las notas públicas son visibles para todos. Las notas privadas nunca salen de tu cuenta.
    features:
      heading_html: Hecho para la forma en que <em>realmente</em> lees.
      for_yourself: Para ti
      with_others: Con otros
      highlights:
        title: Resaltado a nivel de carácter
        body: Marca las palabras exactas que te atravesaron. No sólo el versículo — la línea, la frase, la coma donde todo cambió.
        demo:
          ref: 1 Reyes 19 · 12
          before: "Y tras el fuego "
          highlight: un silbo apacible y delicado
          after: "."
      notes:
        title: Notas privadas y compartidas
        body: Escribe lo que la Escritura significa para ti. Guárdalo entre tú y Dios, compártelo con una persona, o ábrelo al mundo.
        demo:
          ref: Nota · Salmo 46 · 10
          private: Privado
          friends: Amigos
          public: Público
          body: "\"Estad quietos\" no es un sentimiento. Es una instrucción."
      groups:
        title: Biblias en grupo, en tiempo real
        body: Lee con quienes más amas. Los resaltados, las notas y los comentarios se actualizan en vivo — como sentarse en la misma banca, a doscientos kilómetros de distancia.
      public:
        title: Notas públicas con votos
        body: Lee cómo el mismo versículo le habló a alguien cuya vida no se parece en nada a la tuya. Los versículos viven distinto en cada vida.
      bilingual:
        title: Bilingüe — KJV y RV1909
        body: Lee en el idioma de tu corazón. King James en inglés, Reina-Valera en español — cambia entre ellos en cualquier versículo, en cualquier página.
      keyword_search:
        title: Búsqueda por palabra clave
        body: Encuentra el versículo que casi recuerdas. El que tu abuela recitaba. La frase del sermón de hace diez años.
        demo:
          ref: Buscar
          query: versículos sobre sentirse perdido
          result_1_ref: "Salmo 139:7"
          result_1_text: "¿A dónde me iré de tu espíritu?"
          result_2_ref: "Lucas 15:4"
          result_2_text: "¿No deja las noventa y nueve..."
      semantic_search:
        title: Búsqueda semántica (inglés)
        body: "Busca por lo que quieres decir, no por lo que está escrito. Pide \"versículos sobre sentirse perdido\" y encuentra salmos que nunca habrías buscado. Sólo KJV por ahora."
    how:
      heading_html: Tres pasos. <em>Eso es todo.</em>
      step_1_title: Abre la Escritura
      step_1_body: Elige una traducción. Abre un capítulo.
      step_1_demo:
        ref: Mateo 5
        text: "Bienaventurados los pobres en espíritu: porque de ellos es el reino de los cielos. Bienaventurados los que lloran..."
      step_2_title: Marca lo que importa
      step_2_body: Selecciona lo que te impactó. Escribe lo que significó. Privado por defecto.
      step_2_demo:
        ref: Mateo 5 · 4
        before: "Bienaventurados "
        highlight: "los que lloran: porque ellos recibirán consolación"
        after: "."
      step_3_title: Comparte tu historia
      step_3_body: Con una persona. Con un grupo. Con todos.
      step_3_demo:
        ref: Compartiendo con
        group: Grupo pequeño del domingo · 4 lectores
    about:
      heading: Acerca de
      para_1: "Open Bible se basa en una idea sencilla: la Escritura está hecha para leerse en compañía."
      para_2: El versículo que te atraviesa atraviesa a otro, en algún lugar.
      para_3: Saberlo — poder decirlo, poder leer lo que significó para alguien más — cambia cómo lo lees tú.
      para_4: "Dos traducciones de dominio público viven aquí: KJV en inglés, RV1909 en español, con la interfaz en ambos idiomas."
      para_5: Hecho y mantenido por una sola persona. El alojamiento se financia con donaciones — sin suscripción, sin rastreo, sin trampas.
    donate_cta:
      heading: Apoya a Open Bible
      body: Si Open Bible te ha importado, mantenlo abierto para quien llegue después.
      button: Donar
