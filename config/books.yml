# Canonical 66-book reference. Consumed by Bible::OsisImporter and the
# reader view. Any book whose osis_code is absent here is skipped during
# import (this is how we exclude the Apocrypha that ships in KJV OSIS).
#
# Spanish names follow standard Reina-Valera spellings (RV1909). Review
# before shipping Spanish UI — Ester vs Esther and Cantares vs Cántico de
# los Cánticos vary by edition.

