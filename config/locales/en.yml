    aria_label: Reading language suggestion
    reading: "You're reading %{name}."
    switch_to: "Switch to %{name}"
    dismiss: Dismiss
  home:
    hero_meta:
      kjv: KJV English
      rv1909: RV1909 Español
      public_domain: Public domain
    hero_empty_state:
      ref: John 3 · 16
      verse: "For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life."
      cta: "Be the first to share a note on this verse →"
    welcome_html: '<span class="block">Where verses</span> <span class="block">meet voices.</span>'
    subhead: Highlight the words that pierced through. Share what they meant to you. Read what the same verse meant to someone else.
    cta_public_bible: Read the Bible
    cta_how_it_works: See how it works
    how_it_works_title: How it works
    tertiary: No tracking. Donation-supported.
    community:
      heading_html: Read what struck <em>someone else.</em>
      intro: A small slice of what readers are sharing publicly. Public notes are visible to everyone. Private notes never leave your account.
    features:
      heading_html: Built around the way you <em>actually</em> read.
      for_yourself: For yourself
      with_others: With others
      highlights:
        title: Character-level highlighting
        body: Mark the exact words that pierced through. Not just the verse — the line, the phrase, the comma where everything turned.
        demo:
          ref: 1 Kings 19 · 12
          before: "And after the fire "
          highlight: a still small voice
          after: "."
      notes:
        title: Private and shared notes
        body: Write what scripture means to you. Keep it between you and God, share it with one person, or open it up.
        demo:
          ref: Note · Psalm 46 · 10
          private: Private
          friends: Friends
          public: Public
          body: "\"Be still\" is not a feeling. It's an instruction."
      groups:
        title: Group Bibles, real-time
        body: Read with the people closest to you. Highlights, notes, and comments update live — like sitting in the same pew, two hundred miles apart.
      public:
        title: Public notes with upvotes
        body: Read how the same verse landed for someone whose life looks nothing like yours. Verses live differently in every life.
      bilingual:
        title: Bilingual — KJV and RV1909
        body: Read in your heart language. King James English, Reina-Valera Spanish — switch between them on any verse, on any page.
      keyword_search:
        title: Keyword search
        body: Find the verse you almost remember. The one your grandmother quoted. The phrase from a sermon ten years ago.
        demo:
          ref: Search
          query: verses about feeling lost
          result_1_ref: "Psalm 139:7"
          result_1_text: Whither shall I go from thy spirit?
          result_2_ref: "Luke 15:4"
          result_2_text: Doth not leave the ninety and nine...
      semantic_search:
        title: Semantic search (English)
        body: "Search by what you mean, not what's written. Ask for \"verses about feeling lost\" and find Psalms you'd never have looked up. KJV only for now."
    how:
      heading_html: Three steps. <em>That's it.</em>
      step_1_title: Open scripture
      step_1_body: Pick a translation. Open a chapter.
      step_1_demo:
        ref: Matthew 5
        text: "Blessed are the poor in spirit: for theirs is the kingdom of heaven. Blessed are they that mourn..."
      step_2_title: Mark what matters
      step_2_body: Select what struck you. Write what it meant. Yours by default.
      step_2_demo:
        ref: Matthew 5 · 4
        before: "Blessed are "
        highlight: "they that mourn: for they shall be comforted"
        after: "."
      step_3_title: Share your story
      step_3_body: With one person. With a group. With everyone.
      step_3_demo:
        ref: Sharing with
        group: Sunday small group · 4 readers
    about:
      heading: About
      para_1: "Open Bible is built on a simple belief: scripture is meant to be read with someone."
      para_2: The verse that wrecks you wrecks somebody else, somewhere.
      para_3: Knowing that — being able to say so, being able to read what it meant for someone else — changes how you read it yourself.
      para_4: "Two public-domain translations live: KJV in English, RV1909 in Spanish, with the interface in both languages."
      para_5: Built and maintained by one person. Hosting is funded by donations — no subscription, no tracker, no upsell.
    donate_cta:
      heading: Support Open Bible
      body: If Open Bible has mattered to you, keep it open for whoever comes next.
      button: Donate
  bible:
    reader:
      prev_chapter: Previous
