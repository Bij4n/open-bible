# App-level overrides for devise-i18n's English view copy. devise-i18n
# ships "Log in"; we want "Sign in" for consistency with the sign-up /
# sign-out / settings vocabulary in the rest of the UI.

en:
  devise:
    sessions:
      new:
        sign_in: Sign in
    shared:
      links:
        sign_in: Sign in
    mailer:
      reset_password_instructions:
        eyebrow: "Password reset"
        heading: "Change your password"
      confirmation_instructions:
        eyebrow: "Email verification"
        heading: "Confirm your account"
      email_changed:
        eyebrow: "Account update"
        heading: "Email address changed"
      password_change:
        eyebrow: "Account security"
        heading: "Password updated"
      unlock_instructions:
        eyebrow: "Account access"
        heading: "Unlock your account"
