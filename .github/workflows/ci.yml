name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.9
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.9
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.9
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint Ruby for consistent style
        run: bin/rubocop -f github

      - name: Lint ERB templates
        run: bundle exec erb_lint --lint-all

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: open_bible_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/open_bible_test

    steps:
      # SHA-pinned for supply-chain hygiene — tag refs can be force-pushed,
      # commit SHAs cannot. Update the pin when bumping versions.
      # browser-actions/setup-firefox v1.7.1 — see decisions log 2026-04-24.
      - name: Install Firefox for system specs
        uses: browser-actions/setup-firefox@fcf821c621167805dd63a29662bd7cb5676c81a8

      # browser-actions/setup-geckodriver v0.0.0 — the only tagged ref on
      # the repo. master HEAD has newer changes (aarch64 support) but
      # doesn't commit the built index.js, so the action errors with
      # 'File not found: index.js' when pinned there. v0.0.0 is the last
      # ref that bundles the dist. See decisions log 2026-04-24.
      - name: Install geckodriver for system specs
        uses: browser-actions/setup-geckodriver@eb8b0670366f719ca31703766a8cb7e3ea2c56ed

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.9
          bundler-cache: true

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: Run RSpec
        run: |
          # browser-actions/setup-firefox and setup-geckodriver both put
          # the binaries on PATH. spec/rails_helper.rb reads FIREFOX_BINARY
          # and GECKODRIVER_PATH with ~/.local/opt fallbacks for dev; in
          # CI we set them to the runner's resolved paths.
          export FIREFOX_BINARY="$(which firefox)"
          export GECKODRIVER_PATH="$(which geckodriver)"
          echo "FIREFOX_BINARY=$FIREFOX_BINARY"
          echo "GECKODRIVER_PATH=$GECKODRIVER_PATH"
          bundle exec rspec

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
